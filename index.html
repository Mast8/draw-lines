<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Shape Drawer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Dynamic Shape Drawer</h2>
    
    <div class="controls">
        <label for="sideCount">Number of lines (sides): </label>
        <input type="number" id="sideCount" min="3" max="100" value="5">
        <button id="drawBtn">Draw Figure</button>
    </div>

    <canvas id="shapeCanvas" width="500" height="500"></canvas>

    <script src="script.js"></script>
</body>
