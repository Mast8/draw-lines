<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Shape & Star Drawer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h2>Geometric Shape Generator</h2>
        
        <div class="controls">
            <div class="control-group">
                <label for="sideCount">Vertices / Sides: <span id="sideVal">5</span></label>
                <input type="range" id="sideCount" min="3" max="60" value="5">
            </div>

            <div class="control-group">
                <label for="skipCount">Skip Factor (Star Mode): <span id="skipVal">1</span></label>
                <input type="range" id="skipCount" min="1" max="29" value="1">
            </div>

            <div class="control-group">
                <label for="speedCtrl">Drawing Speed:</label>
                <input type="range" id="speedCtrl" min="10" max="120" value="40" step="10">
            </div>

            <button id="drawBtn">Generate Shape</button>
        </div>

        <div class="canvas-container">
            <canvas id="shapeCanvas" width="500" height="500"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
